###

- name: Create provisioning dashboard directory
  file:
    path: /etc/grafana/provisioning/dashboards
    state: directory
    owner: grafana
    group: grafana

- name: Configure dashboard provisioning
  copy:
    dest: /etc/grafana/provisioning/dashboards/dashboard.yml
    content: |
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          options:
            path: /var/lib/grafana/dashboards

###

- name: Create datasource directory
  file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: grafana
    group: grafana

- name: Create datasource directory
  file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: grafana
    group: grafana

- name: Configure Prometheus datasource
  copy:
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://localhost:9090
          isDefault: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Start and enable Grafana server
  ansible.builtin.service:
    name: grafana-server
    enabled: true
    state: started

- name: Check if Grafana is accessible
  ansible.builtin.uri:
    url: http://127.0.0.1:3000
    method: GET
    status_code: 200
  register: result
  retries: 10
  delay: 5
  until: result.status == 200

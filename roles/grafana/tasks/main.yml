---
- name: Ensure dependencies are installed
  apt:
    name:
      - git
    state: present
    update_cache: yes
  become: true

- name: Download Grafana GPG key
  ansible.builtin.get_url:
    url: https://packages.grafana.com/gpg.key
    dest: /usr/share/keyrings/grafana-archive-keyring.gpg
    mode: '0644'

- name: Add Grafana APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana-archive-keyring.gpg] https://packages.grafana.com/oss/deb stable main"
    state: present

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana={{ version }}
    state: present
    update_cache: yes

- name: Grafana configuration file copy
  ansible.builtin.template:
    src: "grafana.conf.j2"
    dest: /etc/grafana/grafana.ini
  notify: event_restart_grafana

- name: Create dashboards directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: 0755

- name: Download Node-Exporter-Full dashboard
  get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: /var/lib/grafana/dashboards/node-exporter-full.json
    owner: grafana
    group: grafana
#  notify: event_restart_grafana



---
route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

  receiver: discord-warning  # default

  routes:
  - match:
      severity: critical
    receiver: discord-critical

  - match:
      severity: warning
    receiver: discord-warning


receivers:
- name: discord-warning
  discord_configs:
  - webhook_url: "https://discord.com/api/webhooks/1495378433767641159/Q_BZsVq28K5GeuX1F-T40PyYpD3eH2hAym8gE_Xaiqk1jg60DYqJ5MtjCIfCZpLxrzny"
    title: "⚠️ Warning"
    message: |
      **{{ .CommonAnnotations.summary }}**
      {{ .CommonAnnotations.description }}

- name: discord-critical
  discord_configs:
  - webhook_url: "https://discord.com/api/webhooks/1495406544324395038/_abymXhisdpQRJEXoxaWoGIzaFitpXYSAyy7NJ0nET0pH6-tQnrgnqi548sMVfUdHPWb"
    title: "🔥 CRITICAL ALERT"
    message: |
      **{{ .CommonAnnotations.summary }}**
      {{ .CommonAnnotations.description }}
